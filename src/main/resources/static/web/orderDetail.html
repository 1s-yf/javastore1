<div class="container">
    <div class="col-md-12">
        <div class="panel panel-primary">
            <div class="panel-heading">订单详情</div>
            <div class="panel-body" id="order-detail-box">
                加载中...
            </div>
            <div class="panel-footer">
                <a class="btn btn-default" href="orders.html">返回订单列表</a>
                <a class="btn btn-warning pull-right" id="btn-after-sale" href="javascript:void(0);">申请售后</a>
            </div>
        </div>
    </div>
</div>

<script>
    $(function() {
        function getQueryParam(name) {
            var search = window.location && window.location.search ? window.location.search : "";
            if (!search || search.length <= 1) {
                return null;
            }
            var query = search.substring(1);
            var parts = query.split("&");
            for (var i = 0; i < parts.length; i++) {
                var kv = parts[i].split("=");
                if (kv.length >= 2 && decodeURIComponent(kv[0]) === name) {
                    return decodeURIComponent(kv.slice(1).join("="));
                }
            }
            return null;
        }

        function statusText(status) {
            if (status === 0) return "待付款";
            if (status === 1) return "待发货";
            if (status === 2) return "待收货";
            if (status === 3) return "待评价";
            if (status === 4) return "已完成";
            if (status === 5) return "已售后";
            return "";
        }

        function buildLogisticsHtml(order) {
            var status = order && order.status != null ? order.status : 0;
            var oid = order && order.oid ? order.oid : "";
            var orderTimeRaw = order && order.orderTime ? order.orderTime : null;
            var html = '';
            html += '<hr/>';
            html += '<div><b>物流信息：</b></div>';

            if (status === 0 || status === 1) {
                html += '<div style="margin-top:8px;">暂无物流信息（待发货）</div>';
                return html;
            }

            var shipper = '王先生';
            var shipFrom = '安徽省宣城市合肥工业大学';
            var shipTimeText = '';
            if (orderTimeRaw) {
                var ot = new Date(orderTimeRaw);
                if (!isNaN(ot.getTime())) {
                    var st = new Date(ot.getTime() + 60 * 1000);
                    shipTimeText = st.toLocaleString();
                }
            }

            var company = '顺丰速运';
            var trackingNo = 'SF' + oid;

            html += '<div style="margin-top:8px;"><b>快递公司：</b>' + company + '</div>';
            html += '<div><b>物流单号：</b>' + trackingNo + '</div>';
            html += '<div><b>发货人：</b>' + shipper + '</div>';
            html += '<div><b>发货地址：</b>' + shipFrom + '</div>';
            if (shipTimeText) {
                html += '<div><b>发货时间：</b>' + shipTimeText + '</div>';
            }

            html += '<div style="margin-top:10px;">';
            html += '<div>1. 商家已发货' + (shipTimeText ? ('（' + shipTimeText + '）') : '') + '</div>';
            html += '<div>2. 快件已揽收</div>';
            html += '<div>3. 运输中</div>';
            if (status >= 3 || status === 4 || status === 5) {
                html += '<div>4. 已签收</div>';
            }
            html += '</div>';

            return html;
        }

        function formatTime(value) {
            if (!value) {
                return "";
            }
            var d = new Date(value);
            if (isNaN(d.getTime())) {
                return value;
            }
            return d.toLocaleString();
        }

        var oid = parseInt(getQueryParam("oid"), 10);
        if (isNaN(oid) || oid <= 0) {
            $("#order-detail-box").html("订单号无效");
            return;
        }

        $("#btn-after-sale").click(function () {
            location.href = "afterSale.html?oid=" + oid;
        });

        $.ajax({
            url: "/orders/getById",
            type: "GET",
            data: { oid: oid },
            dataType: "json",
            success: function (json) {
                if (!json || json.state !== 200 || !json.data) {
                    $("#order-detail-box").html("加载失败：" + (json && json.message ? json.message : ""));
                    return;
                }
                var o = json.data;
                var html = '';
                html += '<div><b>订单号：</b>' + (o.oid || "") + '</div>';
                html += '<div><b>订单状态：</b>' + statusText(o.status) + '</div>';
                html += '<div><b>下单时间：</b>' + formatTime(o.orderTime) + '</div>';
                html += '<div><b>支付时间：</b>' + formatTime(o.payTime) + '</div>';
                html += '<div><b>收货人：</b>' + (o.recvName || "") + '&nbsp;&nbsp;' + (o.recvPhone || "") + '</div>';
                html += '<div><b>收货地址：</b>' + (o.recvProvince || "") + (o.recvCity || "") + (o.recvArea || "") + (o.recvAddress || "") + '</div>';
                html += '<div><b>订单总价：</b>¥' + (o.totalPrice || 0) + '</div>';

                html += buildLogisticsHtml(o);

                if (o.items && o.items.length) {
                    html += '<hr/>';
                    html += '<div><b>商品信息：</b></div>';
                    for (var i = 0; i < o.items.length; i++) {
                        var it = o.items[i];
                        var price = (it.price || 0);
                        html += '<div style="margin-top:8px;">' +
                            '<img src="' + (it.image || '') + '" width="60" style="margin-right:10px;" />' +
                            (it.title || '') +
                            '&nbsp;&nbsp;单价：¥' + price +
                            '&nbsp;&nbsp;数量：' + (it.num || 0) +
                            '</div>';
                    }
                }
                $("#order-detail-box").html(html);
            },
            error: function () {
                $("#order-detail-box").html("请求失败，请先登录");
            }
        });
    });
</script>
