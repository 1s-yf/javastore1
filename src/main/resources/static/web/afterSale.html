<div class="row top-nav">
    <div class="col-md-6">

<div class="container">
    <div class="col-md-12">
        <div class="panel panel-warning">
            <div class="panel-heading">售后处理</div>
            <div class="panel-body">
                <div id="order-info-box">加载中...</div>
                <hr/>
                <form id="form-after-sale" class="form-horizontal">
                    <div class="form-group">
                        <label class="col-sm-2 control-label">售后服务</label>
                        <div class="col-sm-10">
                            <select class="form-control" id="serviceType">
                                <option value="refund_only">仅退款（未收到货）</option>
                                <option value="return_refund">退货退款（已收到货）</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">售后理由</label>
                        <div class="col-sm-10">
                            <select class="form-control" id="reason">
                                <option value="不想要了">不想要了</option>
                                <option value="发货太慢">发货太慢</option>
                                <option value="商品有瑕疵">商品有瑕疵</option>
                                <option value="质量问题">质量问题</option>
                                <option value="拍错/多拍">拍错/多拍</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-offset-2 col-sm-10">
                            <button type="button" class="btn btn-warning" id="btn-submit">提交申请</button>
                            <a class="btn btn-default" href="orders.html">返回订单</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    $(function() {
        function getQueryParam(name) {
            var search = window.location && window.location.search ? window.location.search : "";
            if (!search || search.length <= 1) {
                return null;
            }
            var query = search.substring(1);
            var parts = query.split("&");
            for (var i = 0; i < parts.length; i++) {
                var kv = parts[i].split("=");
                if (kv.length >= 2 && decodeURIComponent(kv[0]) === name) {
                    return decodeURIComponent(kv.slice(1).join("="));
                }
            }
            return null;
        }

        var oid = parseInt(getQueryParam("oid"), 10);
        if (isNaN(oid) || oid <= 0) {
            $("#order-info-box").html("订单号无效");
            $("#btn-submit").prop("disabled", true);
            return;
        }

        function renderOrderInfo(o) {
            var html = '';
            html += '<div><b>订单号：</b>' + (o.oid || "") + '</div>';
            html += '<div><b>订单总价：</b>¥' + (o.totalPrice || 0) + '</div>';
            if (o.items && o.items.length) {
                html += '<div style="margin-top:8px;"><b>商品：</b></div>';
                for (var i = 0; i < o.items.length; i++) {
                    var it = o.items[i];
                    html += '<div style="margin-top:6px;">' +
                        '<img src="' + (it.image || '') + '" width="50" style="margin-right:10px;" />' +
                        (it.title || '') +
                        '&nbsp;&nbsp;× ' + (it.num || 0) +
                        '</div>';
                }
            }
            return html;
        }

        $.ajax({
            url: "/orders/getById",
            type: "GET",
            data: { oid: oid },
            dataType: "json",
            success: function (json) {
                if (!json || json.state !== 200 || !json.data) {
                    $("#order-info-box").html("加载失败：" + (json && json.message ? json.message : ""));
                    return;
                }
                $("#order-info-box").html(renderOrderInfo(json.data));
            },
            error: function () {
                $("#order-info-box").html("请求失败，请先登录");
            }
        });

        $("#btn-submit").click(function() {
            var serviceType = $("#serviceType").val();
            var reason = $("#reason").val();
            if (!serviceType || !reason) {
                alert("请选择售后服务和理由");
                return;
            }
            $.get("/orders/applyAfterSale", { oid: oid }, function (res) {
                if (res && res.state === 200) {
                    alert("申请售后成功");
                    location.href = "orders.html";
                    return;
                }
                alert((res && res.message) ? res.message : "申请失败");
            }).fail(function() {
                alert("申请失败");
            });
        });
    });
</script>

</body>
</html>
